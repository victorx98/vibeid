<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conglin Ruan | AI Product Manager Candidate</title>
  <meta
    name="description"
    content="Resume-style AI portfolio for Conglin Ruan, focused on AI product management, quantitative analysis, and project-specific algorithm views."
  >
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <main class="page">
    <section class="resume-sheet">
      <header class="resume-header">
        <div class="identity-block">
          <h1 id="name"></h1>
          <p class="summary-line" id="summary"></p>
        </div>
        <div class="contact-block" id="contact-block"></div>
      </header>

      <div class="resume-grid">
        <aside class="sidebar">
          <section class="panel">
            <h2>Strengths</h2>
            <ul class="compact-list" id="strength-list"></ul>
          </section>

          <section class="panel">
            <h2>Quantitative Toolkit</h2>
            <div class="quant-grid" id="quant-grid"></div>
          </section>

          <section class="panel">
            <h2>Technical Stack</h2>
            <div class="tag-list" id="stack-list"></div>
          </section>
        </aside>

        <div class="main-column">
          <section class="section-block">
            <div class="section-title-row">
              <h2>Selected Results</h2>
            </div>
            <div class="results-grid" id="results-grid"></div>
          </section>

          <section class="section-block">
            <div class="section-title-row">
              <h2>Experience</h2>
            </div>
            <div id="experience-list"></div>
          </section>

          <section class="section-block">
            <div class="section-title-row">
              <h2>Selected AI Projects</h2>
              <p>Choose a project to inspect the algorithm and the product decisions around it.</p>
            </div>

            <div class="project-layout">
              <div class="project-list" id="project-list"></div>
              <div class="project-detail" id="project-detail"></div>
            </div>
          </section>

          <section class="section-block footer-grid">
            <section>
              <div class="section-title-row">
                <h2>Education</h2>
              </div>
              <div id="education-list"></div>
            </section>

            <section>
              <div class="section-title-row">
                <h2>Links</h2>
              </div>
              <div class="link-list" id="link-list"></div>
            </section>
          </section>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/content.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/renderStatic.js"></script>
  <script src="assets/js/widgets.js"></script>
  <script src="assets/js/renderProjects.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/js/chat.js"></script>
</body>
</html>
